<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Internship Hunter</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #0f1117; color: #e0e0e0; min-height: 100vh; }

  .header {
    background: linear-gradient(135deg, #1a1f2e, #0d2040);
    padding: 20px 32px; border-bottom: 1px solid #1e2a3a;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header h1 span { color: #38bdf8; }
  .refresh-btn {
    padding: 8px 16px; background: #38bdf8; color: #0f1117;
    border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px;
  }
  .refresh-btn:hover { background: #7dd3fc; }

  .stats { display: flex; gap: 12px; padding: 20px 32px; flex-wrap: wrap; }
  .stat-card {
    background: #161b27; border: 1px solid #1e2a3a; border-radius: 12px;
    padding: 16px 20px; flex: 1; min-width: 120px;
  }
  .stat-card .val { font-size: 28px; font-weight: 700; color: #38bdf8; }
  .stat-card .lbl { font-size: 12px; color: #7c8db0; margin-top: 4px; }

  .filters {
    padding: 0 32px 16px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
  }
  .filter-btn {
    padding: 6px 14px; border-radius: 20px; border: 1px solid #2a3a50;
    background: transparent; color: #9aa5be; cursor: pointer; font-size: 12px;
    transition: all .2s;
  }
  .filter-btn.active, .filter-btn:hover {
    background: #38bdf8; color: #0f1117; border-color: #38bdf8; font-weight: 600;
  }
  .search-input {
    padding: 6px 14px; border-radius: 20px; border: 1px solid #2a3a50;
    background: #161b27; color: #e0e0e0; font-size: 12px; outline: none;
    min-width: 200px;
  }

  .jobs { padding: 0 32px 32px; display: grid; gap: 12px; }
  .job-card {
    background: #161b27; border: 1px solid #1e2a3a; border-radius: 12px;
    padding: 16px 20px; display: grid;
    grid-template-columns: 1fr auto; gap: 8px; align-items: start;
    transition: border-color .2s;
  }
  .job-card:hover { border-color: #38bdf8; }
  .job-card.high  { border-left: 3px solid #22c55e; }
  .job-card.medium{ border-left: 3px solid #f59e0b; }
  .job-card.low   { border-left: 3px solid #6b7280; }

  .job-title { font-size: 15px; font-weight: 600; color: #e0e0e0; }
  .job-meta  { font-size: 12px; color: #7c8db0; margin-top: 4px; }
  .job-meta span { margin-right: 12px; }
  .platform-badge {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 10px; font-weight: 600; margin-right: 8px;
  }
  .pl-remoteok   { background: #1e3a2a; color: #22c55e; }
  .pl-internshala{ background: #1e2a3a; color: #38bdf8; }
  .pl-linkedin   { background: #1a2040; color: #6fa8dc; }
  .pl-wellfound  { background: #2a1e3a; color: #a78bfa; }

  .score-bar {
    width: 80px; height: 6px; background: #1e2a3a; border-radius: 3px; margin-top: 8px;
  }
  .score-fill { height: 100%; border-radius: 3px; }

  .job-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
  .score-label {
    font-size: 13px; font-weight: 700;
    color: #22c55e;
  }
  .score-label.medium { color: #f59e0b; }
  .score-label.low    { color: #6b7280; }

  .action-row { display: flex; gap: 6px; margin-top: 4px; }
  .action-btn {
    padding: 4px 10px; border-radius: 6px; border: 1px solid #2a3a50;
    background: transparent; color: #9aa5be; cursor: pointer; font-size: 11px;
    transition: all .15s;
  }
  .action-btn:hover        { border-color: #38bdf8; color: #38bdf8; }
  .action-btn.applied      { background: #14281e; color: #22c55e; border-color: #22c55e33; }
  .action-btn.saved        { background: #1a2a40; color: #38bdf8; border-color: #38bdf833; }
  .action-btn.apply-link   { background: #0077b5; color: #fff; border-color: #0077b5; }

  .status-chip {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 10px; font-weight: 600;
  }
  .chip-applied { background: #14281e; color: #22c55e; }
  .chip-saved   { background: #1a2a40; color: #38bdf8; }
  .chip-ignored { background: #2a1414; color: #f87171; }

  .empty { text-align: center; padding: 60px; color: #7c8db0; font-size: 14px; }
  .empty p { margin-top: 8px; font-size: 12px; }

  .loading { text-align: center; padding: 40px; color: #38bdf8; }
</style>
</head>
<body>

<div class="header">
  <h1>Internship <span>Hunter</span> Dashboard</h1>
  <button class="refresh-btn" onclick="loadAll()">Refresh</button>
</div>

<div class="stats" id="stats"></div>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('good',this)">Good Internships</button>
  <button class="filter-btn" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn" onclick="setFilter('remote',this)">Remote</button>
  <button class="filter-btn" onclick="setFilter('stipend',this)">With Stipend</button>
  <button class="filter-btn" onclick="setFilter('unpaid',this)">Unpaid</button>
  <button class="filter-btn" onclick="setFilter('new',this)">New</button>
  <button class="filter-btn" onclick="setFilter('applied',this)">Applied</button>
  <button class="filter-btn" onclick="setFilter('saved',this)">Saved</button>
  <input class="search-input" id="search" placeholder="Search jobs..." oninput="applySearch()">
</div>

<div class="jobs" id="jobs"><div class="loading">Loading jobs...</div></div>

<script>
let allJobs   = [];
let curFilter = "good";

const API = "";  // same origin

async function loadStats() {
  const d = await fetch(API+"/api/stats").then(r=>r.json()).catch(()=>({}));
  document.getElementById("stats").innerHTML = [
    ["Total Found",    d.total    || 0],
    ["Found Today",    d.today    || 0],
    ["High Priority",  d.high_priority || 0],
    ["New (unseen)",   d.new      || 0],
    ["Applied",        d.applied  || 0],
  ].map(([lbl,val]) => `
    <div class="stat-card">
      <div class="val">${val}</div>
      <div class="lbl">${lbl}</div>
    </div>
  `).join("");
}

async function loadJobs() {
  const jobs = await fetch(API+"/api/jobs?limit=200").then(r=>r.json()).catch(()=>[]);
  allJobs = jobs;
  renderJobs();
}

function setFilter(f, btn) {
  curFilter = f;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderJobs();
}

function applySearch() { renderJobs(); }

function renderJobs() {
  const search  = document.getElementById("search").value.toLowerCase();
  let   jobs    = allJobs;

  if (curFilter === "good")    jobs = jobs.filter(j => j.priority === "high" || j.match_score >= 70);
  if (curFilter === "high")    jobs = jobs.filter(j => j.priority === "high");
  if (curFilter === "medium")  jobs = jobs.filter(j => j.priority === "medium");
  if (curFilter === "new")     jobs = jobs.filter(j => j.status === "new");
  if (curFilter === "applied") jobs = jobs.filter(j => j.status === "applied");
  if (curFilter === "saved")   jobs = jobs.filter(j => j.status === "saved");
  
  if (curFilter === "remote") {
    jobs = jobs.filter(j => {
      const text = (j.location + j.description + j.title).toLowerCase();
      return text.includes("remote") || text.includes("work from home") || text.includes("wfh");
    });
  }
  if (curFilter === "stipend") {
    jobs = jobs.filter(j => {
      const text = (j.description + j.title).toLowerCase();
      return text.includes("stipend") || text.includes("paid") || text.includes("salary") || text.includes("₹") || text.includes("$") || text.includes("lpa") || text.includes("/month");
    });
  }
  if (curFilter === "unpaid") {
    jobs = jobs.filter(j => {
      const text = (j.description + j.title).toLowerCase();
      return !(text.includes("stipend") || text.includes("paid") || text.includes("salary") || text.includes("₹") || text.includes("$") || text.includes("lpa") || text.includes("/month"));
    });
  }

  if (search) jobs = jobs.filter(j =>
    (j.title+j.company+j.location+j.platform).toLowerCase().includes(search));

  const container = document.getElementById("jobs");
  if (!jobs.length) {
    container.innerHTML = `<div class="empty">No jobs found<p>Send "find" to your WhatsApp bot to start hunting</p></div>`;
    return;
  }

  container.innerHTML = jobs.map(job => {
    const score     = job.match_score || 0;
    const pClass    = job.priority || "low";
    const sClass    = score >= 80 ? "" : score >= 60 ? "medium" : "low";
    const fillColor = score >= 80 ? "#22c55e" : score >= 60 ? "#f59e0b" : "#6b7280";
    const plClass   = "pl-" + (job.platform || "").toLowerCase().replace(" ","");

    const statusChip = job.status !== "new"
      ? `<span class="status-chip chip-${job.status}">${job.status.toUpperCase()}</span>` : "";

    const plBadge = `<span class="platform-badge ${plClass}">${job.platform}</span>`;

    return `
    <div class="job-card ${pClass}" id="card-${job.id}">
      <div>
        ${plBadge}${statusChip}
        <div class="job-title">${job.title}</div>
        <div class="job-meta">
          <span>${job.company}</span>
          <span>${job.location}</span>
          ${job.posted_date ? `<span>Posted: ${job.posted_date.slice(0,10)}</span>` : ""}
        </div>
        <div class="score-bar" style="width:120px">
          <div class="score-fill" style="width:${score}%;background:${fillColor}"></div>
        </div>
      </div>
      <div class="job-actions">
        <div class="score-label ${sClass}">${score}%</div>
        <div class="action-row">
          <button class="action-btn apply-link" onclick="window.open('${job.url}','_blank')">Apply</button>
          <button class="action-btn" onclick="markStatus(${job.id},'applied',this)">Applied</button>
          <button class="action-btn" onclick="markStatus(${job.id},'saved',this)">Save</button>
          <button class="action-btn" onclick="markStatus(${job.id},'ignored',this)">Ignore</button>
        </div>
      </div>
    </div>`;
  }).join("");
}

async function markStatus(id, status, btn) {
  await fetch(API+`/api/jobs/${id}/status`, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({status})
  });
  // Update local data
  const job = allJobs.find(j=>j.id===id);
  if (job) job.status = status;
  renderJobs();
}

async function loadAll() {
  await Promise.all([loadStats(), loadJobs()]);
}

loadAll();
setInterval(loadAll, 30000); // auto-refresh every 30s
</script>
</body>
</html>
